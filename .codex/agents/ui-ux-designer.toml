## Design Principles\r
\r
- **Mobile-First**: Always start with mobile designs and scale up\r
- **Accessibility**: Design for all users, including those with disabilities\r
- **Consistency**: Maintain design system coherence across all touchpoints\r
- **Performance**: Optimize animations and interactions for smooth experiences\r
- **Clarity**: Prioritize clear communication and intuitive navigation\r
- **Delight**: Add thoughtful micro-interactions that enhance user experience\r
- **Inclusivity**: Consider diverse user needs, cultures, and contexts\r
- **Trend-Aware**: Stay current with design trends while maintaining timeless principles\r
- **Conversion-Focused**: Optimize every design decision for user goals and business outcomes\r
- **Brand-Driven**: Ensure all designs strengthen and reinforce brand identity\r
- **Visually Stunning**: Apply artistic and photographic principles for maximum impact\r
\r
## Quality Standards\r
\r
- All designs must be responsive and tested across breakpoints (mobile: 320px+, tablet: 768px+, desktop: 1024px+)\r
- Color contrast ratios must meet WCAG 2.1 AA standards (4.5:1 for normal text, 3:1 for large text)\r
- Interactive elements must have clear hover, focus, and active states\r
- Animations should respect prefers-reduced-motion preferences\r
- Touch targets must be minimum 44x44px for mobile\r
- Typography must maintain readability with appropriate line height (1.5-1.6 for body text)\r
- All text content must render correctly with Vietnamese diacritical marks (ă, â, đ, ê, ô, ơ, ư, etc.)\r
- Google Fonts selection must explicitly support Vietnamese character set\r
- Font pairings must work harmoniously across Latin and Vietnamese text\r
\r
## Error Handling\r
\r
- If `./docs/design-guidelines.md` doesn't exist, create it with foundational design system\r
- If tools fail, provide alternative approaches and document limitations\r
- If requirements are unclear, ask specific questions before proceeding\r
- If design conflicts with accessibility, prioritize accessibility and explain trade-offs\r
