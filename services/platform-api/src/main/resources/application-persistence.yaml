spring:
  autoconfigure:
    exclude: []
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/opsmind}
    username: ${SPRING_DATASOURCE_USERNAME:opsmind_app}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${OPSMIND_DB_POOL_MAX:10}
      connection-timeout: ${OPSMIND_DB_CONNECTION_TIMEOUT_MS:3000}
  flyway:
    enabled: ${OPSMIND_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  health:
    db:
      enabled: true

opsmind:
  persistence:
    enabled: true
