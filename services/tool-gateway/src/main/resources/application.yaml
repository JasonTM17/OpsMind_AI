spring:
  application:
    name: opsmind-tool-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.health.DataSourceHealthContributorAutoConfiguration
  jackson:
    deserialization:
      fail-on-trailing-tokens: true
      fail-on-unknown-properties: true
    parser:
      strict-duplicate-detection: true
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: ${TOOL_GATEWAY_PORT:8081}
  shutdown: graceful
  tomcat:
    connection-timeout: 5s
    max-swallow-size: 0B

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

opsmind:
  tool-gateway:
    capability-issuer: ${TOOL_GATEWAY_CAPABILITY_ISSUER:https://platform.invalid.example}
    capability-audience: opsmind-tool-gateway
    jwk-set-uri: ${TOOL_GATEWAY_CAPABILITY_JWK_SET_URI:}
    platform-caller-id: opsmind-platform-api
    workload-issuer: ${TOOL_GATEWAY_WORKLOAD_ISSUER:https://platform.invalid.example}
    workload-audience: opsmind-tool-gateway-workload
    workload-scope: tool.execute
    workload-jwk-set-uri: ${TOOL_GATEWAY_WORKLOAD_JWK_SET_URI:}
    maximum-capability-lifetime: 5m
    maximum-request-bytes: 65536
    maximum-result-bytes: 262144
    persistence:
      enabled: ${TOOL_GATEWAY_PERSISTENCE_ENABLED:false}
      maximum-response-bytes: ${TOOL_GATEWAY_MAX_PERSISTED_RESPONSE_BYTES:131072}
      execution-lease-duration: ${TOOL_GATEWAY_EXECUTION_LEASE_DURATION:PT30S}
    prometheus:
      enabled: ${TOOL_GATEWAY_PROMETHEUS_ENABLED:false}
      base-uri: ${TOOL_GATEWAY_PROMETHEUS_BASE_URI:https://prometheus.invalid.example}
      allow-internal-cleartext: ${TOOL_GATEWAY_PROMETHEUS_ALLOW_INTERNAL_CLEARTEXT:false}
      connect-timeout: ${TOOL_GATEWAY_PROMETHEUS_CONNECT_TIMEOUT:PT2S}
      request-timeout: ${TOOL_GATEWAY_PROMETHEUS_REQUEST_TIMEOUT:PT4S}
      maximum-response-bytes: ${TOOL_GATEWAY_PROMETHEUS_MAX_RESPONSE_BYTES:65536}
      maximum-series: ${TOOL_GATEWAY_PROMETHEUS_MAX_SERIES:1}
      maximum-points: ${TOOL_GATEWAY_PROMETHEUS_MAX_POINTS:10}
      query-window: ${TOOL_GATEWAY_PROMETHEUS_QUERY_WINDOW:PT2M}
      query-step: ${TOOL_GATEWAY_PROMETHEUS_QUERY_STEP:PT1M}
